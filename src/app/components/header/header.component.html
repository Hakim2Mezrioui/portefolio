<nav>
  <ul>
    <li>
      <a href="#home"><i class="bi bi-house-fill fs-6"></i> {{ 'nav.home' | translate }}</a>
    </li>
    <li>
      <a href="#myCareer"><i class="bi bi-briefcase-fill fs-6"></i> {{ 'nav.career' | translate }}</a>
    </li>
    <li>
      <a href="#mySkills"><i class="bi bi-tools fs-6"></i> {{ 'nav.mySkills' | translate }}</a>
    </li>
    <li>
      <a href="#myProjects"
        ><i class="bi bi-clipboard2-pulse-fill fs-6"></i> {{ 'nav.myProjects' | translate }}</a
      >
    </li>
    <li>
      <a href="#myCertificats"><i class="bi bi-award-fill fs-6"></i> {{ 'nav.certificats' | translate }}</a>
    </li>
    <li>
      <a href="#myTemoignages"><i class="bi bi-chat-quote-fill fs-6"></i> {{ 'nav.temoignages' | translate }}</a>
    </li>
    <li>
      <a href="#contactMe"
        ><i class="bi bi-envelope-at-fill fs-6"></i> {{ 'nav.contactMe' | translate }}</a
      >
    </li>
  </ul>

  <i
    #menuIcon
    *ngIf="!showMenuHeader"
    (click)="toogle()"
    class="bi bi-list fs-1"
  ></i>
  <i
    #menuIcon
    *ngIf="showMenuHeader"
    (click)="toogle()"
    class="bi bi-arrow-left fs-3"
  ></i>
  <img alt="logo" src="./assets/images/LOGO_PORFOLIO.png" />
  <div class="nav-right-group">
    <app-icons-link></app-icons-link>
    <span class="nav-group-sep" aria-hidden="true">|</span>
    <div class="lang-switcher">
      <button type="button" class="lang-btn" [class.active]="currentLang === 'en'" (click)="setLang('en')" aria-label="English">EN</button>
      <button type="button" class="lang-btn" [class.active]="currentLang === 'fr'" (click)="setLang('fr')" aria-label="Français">FR</button>
    </div>
  </div>
</nav>

<div #menuHeader>
  <app-menu-header
    appOutsideClick
    [ngClass]="{
      'menu-active': showMenuHeader,
      'menu-hidden': !showMenuHeader && start
    }"
    class="menu"
    (outsideClick)="closeMenuHeader()"
    (isClose)="closeMenuHeader()"
  ></app-menu-header>
</div>
