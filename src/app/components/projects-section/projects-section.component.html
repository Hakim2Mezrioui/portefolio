<div id="myProjects" class="projects-body">
  <app-custom-title
    [title]="'projects.sectionTitle' | translate"
    [subtitle]="'What I Have Built'">
  </app-custom-title>
  <div *ngFor="let project of projectsList; let i = index">
    <app-project [projectInfo]="project" [reverse]="i % 2 === 1"></app-project>
  </div>
</div>
