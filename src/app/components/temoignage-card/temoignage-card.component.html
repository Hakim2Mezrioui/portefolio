<div class="temo-card">
  <div class="card-left-bar"></div>
  <div class="card-content">
    <div class="card-meta">
      <span class="meta-date">
        <i class="bi bi-calendar3"></i>
        {{ temoignage.date }}
      </span>
      <span class="meta-relation">{{ temoignage.relationKey }}</span>
    </div>
    <div class="quote-block">
      <i class="bi bi-quote quote-bg"></i>
      <p class="quote-text">{{ temoignage.textKey | translate }}</p>
    </div>
    <div class="author-section">
      <div class="author-avatar">
        <span>{{ initials }}</span>
      </div>
      <div class="author-details">
        <h4 class="author-name">{{ temoignage.name }}</h4>
        <p class="author-role">{{ temoignage.positionKey | translate }}</p>
        <p class="author-company" *ngIf="temoignage.company">{{ temoignage.company }}</p>
      </div>
      <a
        class="linkedin-badge"
        [href]="temoignage.linkedinUrl"
        target="_blank"
        rel="noopener noreferrer"
        [title]="'temoignages.seeOnLinkedin' | translate"
      >
        <i class="bi bi-linkedin"></i>
      </a>
    </div>
  </div>
</div>
