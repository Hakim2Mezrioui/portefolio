<div id="myTemoignages" class="temoignages-body">
  <div class="temoignages-bg" aria-hidden="true"></div>
  <div class="temoignages-fg">
  <app-custom-title
    [title]="'temoignages.sectionTitle' | translate"
    [subtitle]="'What others say'">
  </app-custom-title>
  <div class="temoignages-content">
    <div class="temoignages-grid">
      <app-temoignage-card
        *ngFor="let temo of temoignages; let i = index"
        [temoignage]="temo"
      ></app-temoignage-card>
    </div>
    <div class="temoignages-cta" data-aos="fade-up">
      <a
        class="linkedin-all-link"
        href="https://www.linkedin.com/in/hakim-mezrioui/details/recommendations/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <i class="bi bi-linkedin"></i>
        {{ 'temoignages.allRecommendations' | translate }}
      </a>
    </div>
  </div>
  </div>
</div>
