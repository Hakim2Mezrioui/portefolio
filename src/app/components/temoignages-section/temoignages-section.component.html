<div id="myTemoignages" class="temoignages-body">
  <app-custom-title [title]="'temoignages.sectionTitle' | translate"></app-custom-title>
  <div class="temoignages-content">
    <div class="temoignages-grid">
      <app-temoignage-card
        *ngFor="let temo of temoignages; let i = index"
        [temoignage]="temo"
        data-aos="fade-up"
        data-aos-duration="800"
        [attr.data-aos-delay]="i * 150"
      ></app-temoignage-card>
    </div>
    <div class="temoignages-cta" data-aos="fade-up" data-aos-duration="800" data-aos-delay="500">
      <a
        class="linkedin-all-link"
        href="https://www.linkedin.com/in/hakim-mezrioui/details/recommendations/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <i class="bi bi-linkedin"></i>
        {{ 'temoignages.allRecommendations' | translate }}
      </a>
    </div>
  </div>
</div>
